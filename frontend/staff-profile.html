
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Staff - AMS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header">
        <h2><i class="fas fa-user-tie"></i> Staff Portal</h2>
    </div>
    <nav class="sidebar-nav">
        <ul>
            <li><a href="staff-dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i>
                Dashboard</a></li>
            <li><a href="staff-profile.html" class="nav-link active"><i class="fas fa-user"></i> My Profile</a></li>
            <li><a href="staff-assigned-requests.html" class="nav-link "><i
                        class="fas fa-clipboard-list"></i> Assigned Requests</a></li>
            <li><a href="staff-update-request.html" class="nav-link"><i class="fas fa-edit"></i> Update
                Request</a></li>
            <li><a href="#" id="logoutBtn" class="nav-link logout"><i class="fas fa-sign-out-alt"></i>
                Logout</a></li>
        </ul>
    </nav>
</aside>

    <div class="main-content">
        <div class="header">
            <h1><i class="fas fa-user"></i> My Profile</h1>
            <a href="staff-dashboard.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>

        <div class="staff-profile-card" id="profileContainer"> <h2><i class="fas fa-id-card"></i> Staff Information</h2>
            <div class="profile-details">
                <div class="profile-detail-item">
                    <div class="label">Staff ID</div>
                    <div class="value" id="staffId">...</div> </div>
                <div class="profile-detail-item">
                    <div class="label">Name</div>
                    <div class="value" id="staffName">...</div> </div>
                <div class="profile-detail-item">
                    <div class="label">Role</div>
                    <div class="value" id="staffRole">...</div> </div>
                <div class="profile-detail-item">
                    <div class="label">Contact</div>
                    <div class="value" id="staffContact">...</div> </div>
                <div class="profile-detail-item">
                    <div class="label">Email</div>
                    <div class="value" id="staffEmail">...</div> </div>
                <div class="profile-detail-item">
                    <div class="label">Join Date</div>
                    <div class="value" id="staffJoinDate">...</div> </div>
            </div>

            <div class="status-toggle">
                <label for="statusToggle">Status:</label>
                <input type="checkbox" id="statusToggle">
                <span id="statusText">...</span>
            </div>
        </div>

    </div>

    <script src="js/staff-profile.js"></script>
    </body>
</html>
