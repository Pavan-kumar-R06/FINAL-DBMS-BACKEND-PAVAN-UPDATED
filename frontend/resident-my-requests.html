<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Service Requests - AMS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-home"></i> Resident Portal</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="resident-dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i>
                            Dashboard</a></li>
                    <li><a href="resident-my-flat.html" class="nav-link"><i class="fas fa-building"></i> My Flat
                            Info</a></li>
                    <li><a href="resident-my-requests.html" class="nav-link active"><i
                                class="fas fa-clipboard-list"></i> My Service Requests</a></li>
                    <li><a href="resident-request-service.html" class="nav-link"><i class="fas fa-tools"></i> Request
                            Service</a></li>
                            <li> <a href="account-settings.html" class="nav-link"><i class="fas fa-user-cog"></i>
                             Account Settings</a></li>  
                    <li><a href="#" id="logoutBtn" class="nav-link logout"><i class="fas fa-sign-out-alt"></i>
                            Logout</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <h1>My Service Requests</h1>
                <div class="user-info">
                    <span id="welcomeMessage"></span>
                </div>
            </header>

            <!-- Content -->
            <main class="content" id="mainContent">
                <!-- Filters -->
                <div class="filters-section">
                    <div class="filter-group">
                        <label for="statusFilter">Filter by Status:</label>
                        <select id="statusFilter" class="form-control">
                            <option value="">All Status</option>
                            <option value="Pending">Pending</option>
                            <option value="Working">Working</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button id="refreshBtn" class="btn btn-primary">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>

                <!-- Service Requests List -->
                <div class="requests-container">
                    <div id="requestsList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <span>Loading your service requests...</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/my-requests.js"></script>
</body>

</html>
