<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigned Requests - Staff - AMS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-user-tie"></i> Staff Portal</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="staff-dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="staff-profile.html" class="nav-link"><i class="fas fa-user"></i> My Profile</a></li>
                    <li><a href="staff-assigned-requests.html" class="nav-link active"><i class="fas fa-clipboard-list"></i> Assigned Requests</a></li>
                    <li><a href="staff-update-request.html" class="nav-link"><i class="fas fa-edit"></i> Update Request</a></li>
                    <li><a href="#" id="logoutBtn" class="nav-link logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </nav>
        </aside>

        <div class="main-content">
            <header class="header">
                <h1>My Assigned Requests</h1>
                <div class="user-info">
                    <span id="welcomeMessage"></span>
                </div>
            </header>

            <main class="content" id="mainContent">
                <div class="filters-section">
                    <div class="filter-group">
                        <label for="statusFilter">Filter by Status:</label>
                        <select id="statusFilter" class="form-control">
                            <option value="">All Status</option>
                            <option value="Pending">Pending</option>
                            <option value="Working">Working</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button id="refreshBtn" class="btn btn-primary">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>

                <div class="requests-container">
                    <div id="assignedRequestsList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <span>Loading assigned requests...</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/staff-assigned-requests.js"></script>
</body>
</html>
